<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JIAT-Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen">

  <!-- Header -->
  <header class="bg-gray-800 p-4 text-center text-xl font-bold">
    JIAT-Chatbot
  </header>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

  <!-- Image Preview -->
  <div id="imagePreview" class="hidden bg-gray-800 p-4 border-t border-gray-700">
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-300">Selected image:</span>
      <img id="previewImg" class="max-w-32 max-h-32 rounded" />
      <button onclick="clearImage()" class="text-red-400 hover:text-red-300">✕</button>
    </div>
  </div>

  <!-- Input Area -->
  <div class="bg-gray-800 p-4 flex gap-2">
    <select 
      id="modelSelect" 
      class="p-2 rounded bg-gray-700 focus:outline-none"
    >
      <option value="stepfun/step-3.5-flash:free">StepFun Step-3.5-Flash (Free)</option>
      <option value="google/gemma-3-12b-it:free">Google Gemma-3-12B-IT (Free)</option>
      <option value="nvidia/nemotron-3-super-120b-a12b:free">NVIDIA Nemotron-3-Super-120B (Free)</option>
      <option value="arcee-ai/trinity-large-preview:free">Arcee Trinity-Large-Preview (Free)</option>
      <option value="meta-llama/llama-3.2-3b-instruct:free">Meta Llama-3.2-3B (Free)</option>
      <option value="microsoft/wizardlm-2-8x22b:free">Microsoft WizardLM-2-8x22B (Free)</option>
      <option value="mistralai/mistral-7b-instruct:free">Mistral 7B Instruct (Free)</option>
    </select>
    <input 
      id="imageInput" 
      type="file" 
      accept="image/*"
      class="hidden"
    />
    <button 
      onclick="document.getElementById('imageInput').click()"
      class="bg-gray-600 px-3 py-2 rounded hover:bg-gray-500"
      title="Upload Image"
      id="imageButton"
    >
      📷
    </button>
    <input 
      id="userInput" 
      type="text" 
      placeholder="Type your message..."
      class="flex-1 p-2 rounded bg-gray-700 focus:outline-none"
    />
    <button 
      onclick="sendMessage()" 
      class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700"
    >
      Send
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
